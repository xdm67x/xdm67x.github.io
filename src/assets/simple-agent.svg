<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" stroke="#334155" stroke-width="2"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#glowGrad)" stroke-width="4" opacity="0.6"/>

  <!-- Neural network nodes behind terminal -->
  <g opacity="0.3">
    <circle cx="120" cy="130" r="4" fill="#22d3ee"/>
    <circle cx="280" cy="130" r="4" fill="#818cf8"/>
    <circle cx="100" cy="200" r="4" fill="#c084fc"/>
    <circle cx="300" cy="200" r="4" fill="#22d3ee"/>
    <circle cx="140" cy="270" r="4" fill="#818cf8"/>
    <circle cx="260" cy="270" r="4" fill="#c084fc"/>
    <line x1="120" y1="130" x2="280" y2="130" stroke="#334155" stroke-width="1"/>
    <line x1="120" y1="130" x2="100" y2="200" stroke="#334155" stroke-width="1"/>
    <line x1="280" y1="130" x2="300" y2="200" stroke="#334155" stroke-width="1"/>
    <line x1="100" y1="200" x2="140" y2="270" stroke="#334155" stroke-width="1"/>
    <line x1="300" y1="200" x2="260" y2="270" stroke="#334155" stroke-width="1"/>
    <line x1="140" y1="270" x2="260" y2="270" stroke="#334155" stroke-width="1"/>
    <line x1="120" y1="130" x2="300" y2="200" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
    <line x1="280" y1="130" x2="100" y2="200" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Terminal window -->
  <rect x="85" y="110" width="230" height="180" rx="12" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <rect x="85" y="110" width="230" height="28" rx="12" fill="#1e293b"/>
  <rect x="85" y="126" width="230" height="12" fill="#1e293b"/>

  <!-- Window controls -->
  <circle cx="105" cy="124" r="5" fill="#ef4444"/>
  <circle cx="122" cy="124" r="5" fill="#f59e0b"/>
  <circle cx="139" cy="124" r="5" fill="#22c55e"/>

  <!-- Terminal content -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13">
    <text x="100" y="155" fill="#22d3ee" font-weight="bold">$</text>
    <text x="115" y="155" fill="#e2e8f0">agent</text>
    <text x="160" y="155" fill="#94a3b8">--task</text>
    <text x="210" y="155" fill="#c084fc">"code"</text>

    <text x="100" y="178" fill="#22d3ee" font-weight="bold">&gt;</text>
    <text x="115" y="178" fill="#22c55e">observing</text>
    <text x="185" y="178" fill="#94a3b8">...</text>

    <text x="100" y="201" fill="#22d3ee" font-weight="bold">&gt;</text>
    <text x="115" y="201" fill="#818cf8">acting</text>
    <text x="160" y="201" fill="#94a3b8">...</text>

    <text x="100" y="224" fill="#22d3ee" font-weight="bold">&gt;</text>
    <text x="115" y="224" fill="#f59e0b">review</text>
    <text x="165" y="224" fill="#94a3b8">done</text>

    <!-- Cursor -->
    <rect x="100" y="245" width="8" height="14" fill="#22d3ee" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- AI brain icon overlay -->
  <g transform="translate(265, 255)">
    <circle cx="0" cy="0" r="28" fill="#0f172a" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>
    <path d="M -12 -4 C -12 -12, -4 -16, 0 -12 C 4 -16, 12 -12, 12 -4 C 16 0, 16 8, 8 12 C 4 16, -4 16, -8 12 C -16 8, -16 0, -12 -4" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-6" cy="0" r="2" fill="#22d3ee"/>
    <circle cx="6" cy="0" r="2" fill="#818cf8"/>
    <circle cx="0" cy="8" r="2" fill="#c084fc"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="url(#accentGrad)" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="0" x2="0" y2="8" stroke="url(#accentGrad)" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="0" x2="0" y2="8" stroke="url(#accentGrad)" stroke-width="1" opacity="0.6"/>
  </g>

</svg>
